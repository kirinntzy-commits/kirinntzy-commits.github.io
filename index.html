<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Туристический гид по ВКО</title>
    
    <!-- PWA НАСТРОЙКИ (ДОБАВЛЕНО) -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" content="#2d6a4f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ВКО Тур">
    
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
        }

        #map {
            width: 100%;
            height: 100vh;
            position: relative;
        }

        .sidebar {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 360px;
            max-width: calc(100% - 40px);
            max-height: calc(100vh - 40px);
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 28px rgba(0,0,0,0.15);
            overflow-y: auto;
            z-index: 1000;
        }

        .sidebar-header {
            background: linear-gradient(135deg, #2d6a4f, #1b4d3e);
            color: white;
            padding: 18px 20px;
            border-radius: 20px 20px 0 0;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            position: sticky;
            top: 0;
        }

        .sidebar-content {
            padding: 16px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #2d6a4f;
            margin: 16px 0 12px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title:first-of-type {
            margin-top: 0;
        }

        .places-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .place-card {
            display: flex;
            gap: 12px;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #eee;
        }

        .place-card:hover {
            background: #e8f5e9;
            transform: translateX(4px);
            border-color: #2d6a4f;
        }

        .place-img {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            object-fit: cover;
        }

        .place-info {
            flex: 1;
        }

        .place-name {
            font-weight: bold;
            color: #1b4d3e;
            margin-bottom: 4px;
        }

        .place-desc {
            font-size: 11px;
            color: #666;
            line-height: 1.3;
        }

        .route-box {
            background: #f0fdf4;
            border-radius: 16px;
            padding: 14px;
            margin-top: 8px;
        }

        select, button {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
        }

        select {
            background: white;
        }

        button {
            background: #2d6a4f;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: #1b4d3e;
            transform: translateY(-1px);
        }

        .route-result {
            background: white;
            border-radius: 12px;
            padding: 12px;
            margin-top: 12px;
            font-size: 13px;
            border-left: 4px solid #2d6a4f;
            display: none;
        }

        .preview-card {
            background: linear-gradient(135deg, #f9f9f9, #fff);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid #e0e0e0;
            display: none;
        }

        .preview-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
        }

        .preview-info {
            padding: 14px;
        }

        .preview-name {
            font-size: 18px;
            font-weight: bold;
            color: #1b4d3e;
            margin-bottom: 8px;
        }

        .preview-desc {
            font-size: 13px;
            color: #555;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .preview-meta {
            font-size: 12px;
            color: #777;
            padding-top: 8px;
            border-top: 1px solid #eee;
        }

        .btn-route-small {
            background: #2d6a4f;
            margin-top: 12px;
            padding: 10px;
        }

        .attribution {
            position: absolute;
            bottom: 12px;
            left: 12px;
            background: rgba(255,255,255,0.9);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            z-index: 1000;
            pointer-events: none;
        }

        .custom-marker {
            background: white;
            border-radius: 50%;
            padding: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .custom-marker:hover {
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            .sidebar {
                top: auto;
                bottom: 16px;
                right: 16px;
                left: 16px;
                width: auto;
                max-height: 55vh;
            }
            .place-img {
                width: 50px;
                height: 50px;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .preview-card, .route-result {
            animation: fadeIn 0.2s ease;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <div class="sidebar">
        <div class="sidebar-header">
            🏔️ Туристический гид по ВКО
        </div>
        <div class="sidebar-content">
            <div id="previewCard" class="preview-card">
                <img id="previewImg" class="preview-img" src="" alt="">
                <div class="preview-info">
                    <div id="previewName" class="preview-name"></div>
                    <div id="previewDesc" class="preview-desc"></div>
                    <div id="previewMeta" class="preview-meta"></div>
                    <button id="previewRouteBtn" class="btn-route-small">🚗 Построить маршрут</button>
                </div>
            </div>

            <div class="section-title">📍 Достопримечательности</div>
            <ul id="placesList" class="places-list">
                <li style="text-align:center; padding:20px;">Загрузка...</li>
            </ul>

            <div class="section-title">🗺️ Построить маршрут</div>
            <div class="route-box">
                <select id="destinationSelect">
                    <option value="">Выберите место...</option>
                </select>
                <button id="buildRouteBtn">🚗 Как добраться</button>
                <div id="routeResult" class="route-result"></div>
            </div>
        </div>
    </div>

    <div class="attribution">
        🗺️ Карта: OpenFreeMap | 🚗 Маршруты: OSRM
    </div>

    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <script src="app.js"></script>
    
    <!-- Service Worker регистрация (ДОБАВЛЕНО) -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('✅ Service Worker зарегистрирован'))
                .catch(err => console.log('❌ Ошибка SW:', err));
        }
    </script>
</body>
</html>
